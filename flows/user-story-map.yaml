flow:
  id: user-story-map-v1
  name: User Story Map Generator
  description: Generates a user story map with cross-functional review.
  steps:
    - id: story-mapping
      type: refine
      max_iterations: 3
      max_rounds: 2
      lead: product-manager
      reviewers: [product-critic, ux-researcher, engineering-lead]
      artifacts:
        - name: user-story-map.md
      context:
        - flow.input
