flow:
  id: release-notes-v1
  name: Release Notes Generator
  description: Generates polished release notes from a change summary.
  steps:
    - id: writing
      type: refine
      max_iterations: 2
      max_rounds: 1
      lead: ux-writer
      reviewers: [product-manager, tech-writer]
      artifacts:
        - name: release-notes.md
      context:
        - flow.input
