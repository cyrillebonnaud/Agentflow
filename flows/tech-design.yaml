flow:
  id: tech-design-v1
  name: Tech Design Generator
  description: Generates architecture approaches and a tech spec with engineering review.
  steps:
    - id: architecture
      max_iterations: 3
      max_rounds: 2
      lead: tech-architect
      reviewers: [engineering-lead]
      artifact_type: md
      context:
        - flow.input

    - id: select-architecture
      agent: engineering-lead
      depends_on: [architecture]

    - id: tech-writing
      max_iterations: 2
      max_rounds: 1
      lead: tech-writer
      reviewers: [engineering-lead, qa-reviewer]
      tracks: inherit
      depends_on: [select-architecture]
      artifacts:
        - name: tech-spec.md
      context:
        - artifacts.architecture.{{track}}
        - flow.input
